###############################################################################
# Strategic-merge patch: tell the postgres container to read /etc/postgresql/
# postgresql.conf from the tuned ConfigMap instead of using the image default.
###############################################################################
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bench-storage
spec:
  template:
    spec:
      containers:
        - name: postgres
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
          volumeMounts:
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
      volumes:
        - name: config
          configMap:
            name: postgres-config
