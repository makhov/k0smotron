apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tuned overlay for postgres + mysql. Inherits the default storage stack
# (postgres + mysql + minio + namespace + storageclass) from the parent
# kustomization, then layers in tuning ConfigMaps and StatefulSet patches
# that mount them.
#
# Apply with: kubectl apply -k bench/infra/manifests/storage/tuned

resources:
  - ../base
  - postgres-configmap.yaml
  - mysql-configmap.yaml

patches:
  - path: postgres-patch.yaml
    target:
      kind: StatefulSet
      name: postgres
  - path: mysql-patch.yaml
    target:
      kind: StatefulSet
      name: mysql
