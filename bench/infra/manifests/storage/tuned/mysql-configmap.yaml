###############################################################################
# MySQL tuning ConfigMap, applied only by the `tuned` overlay.
#
# Minimal tuning: only `max_connections` is raised. Default mysql allows
# 151 connections; kine sidecars open 2-5 each, so 100+ HCPs hit
# "Error 1040: Too many connections". Bumping to 500 is the realistic
# day-1 fix. All other settings (innodb_buffer_pool_size,
# innodb_io_capacity, etc.) stay at image defaults so the article's perf
# numbers reflect a minimum-effort install.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: bench-storage
data:
  my.cnf: |
    [mysqld]
    max_connections = 500
