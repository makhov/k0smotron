###############################################################################
# Postgres tuning ConfigMap, applied only by the `tuned` overlay.
#
# Minimal tuning: only `max_connections` is raised. Default postgres allows
# 100 connections; kine sidecars open 2-5 each, so at 100+ HCPs every other
# scenario hits "FATAL: sorry, too many clients already". Bumping
# max_connections to 500 is the single knob a user is most likely to turn,
# and it's the only one that prevents trivial saturation. All other settings
# (shared_buffers, work_mem, io_concurrency, etc.) stay at the image
# defaults so the article's perf numbers reflect a realistic
# minimum-effort install rather than a heavily tuned configuration.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: bench-storage
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 500
