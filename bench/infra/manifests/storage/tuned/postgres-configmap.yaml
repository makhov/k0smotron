###############################################################################
# Postgres tuning ConfigMap, applied only by the `tuned` overlay.
# Sized for the r6i.xlarge node (4 vCPU / 32 GiB / io2 5000 IOPS) and the
# benchmark workload — many short-lived connections from kine sidecars.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: bench-storage
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 2000
    shared_buffers = 8GB
    effective_cache_size = 24GB
    maintenance_work_mem = 512MB
    work_mem = 16MB
    wal_buffers = 64MB
    checkpoint_completion_target = 0.9
    random_page_cost = 1.1
    effective_io_concurrency = 200
    max_wal_size = 4GB
    min_wal_size = 1GB
    synchronous_commit = on
